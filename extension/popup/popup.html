<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PromptPerfect</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 14px 16px 16px;
      width: 340px;
      background: #050505;
      color: #ECECEC;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #ECECEC;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .links a {
      font-size: 11px;
      color: #4552FF;
      text-decoration: none;
      font-weight: 500;
    }
    .links a:hover { text-decoration: underline; }
    .links { display: flex; gap: 10px; }
    .version {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 500;
      color: #71717a;
      background: #18181b;
      padding: 3px 7px;
      border-radius: 5px;
      border: 1px solid #27272a;
    }

    /* ── Optimize section ── */
    .optimize-section { margin-bottom: 10px; }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      font-weight: 500;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea, input, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      background: #0d0d0d;
      color: #ECECEC;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
    }
    textarea:focus, input:focus, select:focus {
      outline: none;
      border-color: #4552FF;
    }
    textarea { line-height: 1.5; }

    #promptInput { min-height: 88px; margin-bottom: 8px; }

    .mode-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .mode-row select {
      flex: 1;
      margin-bottom: 0;
      padding: 7px 10px;
    }
    #optimizeBtn {
      flex-shrink: 0;
      padding: 7px 16px;
      border: none;
      border-radius: 8px;
      background: #4552FF;
      color: white;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    #optimizeBtn:hover:not(:disabled) { opacity: 0.9; }
    #optimizeBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Result ── */
    #resultSection { margin-bottom: 10px; }
    #resultSection[hidden] { display: none; }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    #resultOutput {
      min-height: 80px;
      margin-bottom: 6px;
      color: #d4d4d4;
    }
    #copyBtn {
      padding: 5px 12px;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      background: #111;
      color: #a1a1aa;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #copyBtn:hover { color: #ECECEC; border-color: #4552FF; }

    /* ── Optimize status (error / loading) ── */
    #optimizeStatus {
      font-size: 12px;
      min-height: 1.2em;
      margin-bottom: 6px;
    }
    #optimizeStatus.err { color: #ef4444; }

    /* ── Settings panel ── */
    details {
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    summary {
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 500;
      color: #71717a;
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before {
      content: '▶';
      font-size: 9px;
      transition: transform 0.15s;
      display: inline-block;
    }
    details[open] summary::before { transform: rotate(90deg); }
    .settings-body {
      padding: 0 12px 12px;
    }
    .settings-body input {
      margin-bottom: 10px;
      font-size: 12px;
    }
    .settings-body input:last-of-type { margin-bottom: 0; }
    #save {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: #4552FF;
      color: white;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    #save:hover { opacity: 0.9; }
    #connStatus {
      margin-top: 8px;
      font-size: 11px;
      min-height: 1.2em;
    }
    #connStatus.connected { color: #22c55e; }
    #connStatus.disconnected { color: #ef4444; }

    /* ── Footer ── */
    footer {
      padding-top: 10px;
      border-top: 1px solid #1a1a1a;
      font-size: 11px;
      color: #52525b;
    }
    footer a { color: #4552FF; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header-row">
    <h1>PromptPerfect</h1>
    <div class="header-right">
      <div class="links">
        <a id="link-app" href="https://promptperfect-beaglecorp.vercel.app" target="_blank" rel="noopener noreferrer">App</a>
        <a id="link-docs" href="https://promptperfect-beaglecorp.vercel.app/docs" target="_blank" rel="noopener noreferrer">Docs</a>
      </div>
      <span id="ext-version" class="version">…</span>
    </div>
  </div>

  <!-- Primary: Optimize in popup -->
  <div class="optimize-section">
    <label for="promptInput">Prompt</label>
    <textarea id="promptInput" placeholder="Paste your prompt here…" spellcheck="false"></textarea>

    <div class="mode-row">
      <select id="mode" aria-label="Optimization mode">
        <option value="better">Better</option>
        <option value="specific">Specific</option>
        <option value="cot">Chain of thought</option>
        <option value="developer">Developer</option>
        <option value="research">Research</option>
        <option value="beginner">Beginner</option>
        <option value="product">Product</option>
        <option value="marketing">Marketing</option>
      </select>
      <button type="button" id="optimizeBtn" disabled>✨ Optimize</button>
    </div>

    <div id="optimizeStatus" role="status" aria-live="polite"></div>
  </div>

  <!-- Result (hidden until a response arrives) -->
  <div id="resultSection" hidden>
    <div class="result-header">
      <label for="resultOutput" style="margin:0">Result</label>
      <button type="button" id="copyBtn">Copy</button>
    </div>
    <textarea id="resultOutput" readonly spellcheck="false"></textarea>
  </div>

  <!-- Settings (collapsed by default) -->
  <details id="settingsPanel">
    <summary>⚙ Settings</summary>
    <div class="settings-body">
      <label for="apiUrl">API URL</label>
      <input type="text" id="apiUrl" placeholder="https://promptperfect-beaglecorp.vercel.app" />
      <label for="apiKey">API Key <span style="color:#52525b;font-weight:400">(BYOK — optional)</span></label>
      <input type="password" id="apiKey" placeholder="Leave empty to use default Gemini" />
      <button type="button" id="save">Save settings</button>
      <p id="connStatus"></p>
    </div>
  </details>

  <footer>
    <strong style="color:#71717a;">Beagle</strong> — Prompt engineering, productized. &nbsp;
    <a href="https://beaglecorp.com" target="_blank" rel="noopener noreferrer">beaglecorp.com</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
